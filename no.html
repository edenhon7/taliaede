<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thank You</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Georgia, serif;

    background:
      linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
      url('photo.jpg');

    background-size:cover;
    background-position:center;
}

.card{
    background:rgba(255,255,255,0.95);
    padding:50px;
    border-radius:20px;
    max-width:650px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

h1{
    color:#d63384;
    margin-bottom:20px;
}

p{
    line-height:1.8;
    color:#333;
    font-size:18px;
}
</style>
</head>

<body>

<div class="card">
    <h1>I Understand ❤️</h1>

    <p>
        Thank you for reading everything and taking the time to go through this.
    </p>

    <p>
        I respect your decision, even if it's not what I hoped for.
        I know trust takes time, and I accept where things are right now.
    </p>

    <p>
        I genuinely wish you happiness, whatever happens next.
    </p>

    <h2>Take care ❤️</h2>
</div>

</body>
</html>
