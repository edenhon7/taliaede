<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>One More Chance?</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;

    background:
      linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)),
      url('photo.jpg');

    background-size:cover;
    background-position:center;
}

.box{
    background:rgba(255,255,255,0.95);
    padding:40px;
    border-radius:20px;
    text-align:center;
    max-width:500px;
}

h1{
    margin-bottom:25px;
    color:#d63384;
}

button{
    padding:12px 30px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.yes{
    background:#ff4d88;
    color:white;
}

.no{
    background:#ddd;
}
</style>
</head>

<body>

<div class="box">
    <h1>Can we give it another go? ❤️</h1>

    <button class="yes"
        onclick="window.location.href='yes.html'">
        Yes ❤️
    </button>

    <button class="no"
        onclick="window.location.href='no.html'">
        No
    </button>
</div>

</body>
</html>
