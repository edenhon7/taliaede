<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>One More Chance?</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;

    background:
      linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
      url('photo.jpg');

    background-size:cover;
    background-position:center;
}

.box{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
}

button{
    padding:12px 30px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.yes{
    background:#ff4d88;
    color:white;
}

.no{
    background:#ddd;
}
</style>
</head>

<body>

<div class="box">
    <h1>Can we give it another go? ❤️</h1>

    <button class="yes"
        onclick="alert('You just made me the happiest man alive ❤️')">
        Yes
    </button>

    <button class="no"
        onclick="alert('I understand. Thank you for reading everything ❤️')">
        No
    </button>
</div>

</body>
</html>
